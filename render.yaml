services:
  - type: web
    name: ai-booking-os-backend
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: ./node_modules/.bin/knex migrate:latest --knexfile knexfile.ts --env production && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
databases:
  - name: ai-booking-os-db
    plan: starter
    databaseName: ai_booking_os
    postgresMajorVersion: "15"
